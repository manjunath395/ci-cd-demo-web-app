apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-webapp
  template:
    metadata:
      labels:
        app: demo-webapp
    spec:
      imagePullSecrets:
      - name: dockerhub-secret

      containers:
      - name: demo-webapp
        image: 867492128202.dkr.ecr.ap-south-1.amazonaws.com/demo-webapp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
